<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Code Sync - Editor</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ================= LOADER ================= -->
  <div id="globalLoader">
    <div class="spinner"></div>
    <div id="loaderText">Loading...</div>
  </div>

  <!-- ================= JOIN ROOM ================= -->
  <div class="homePageWrapper" id="homePage">
    <div class="formWrapper">

      <img class="homePageLogo" src="code-sync.png" alt="Logo" />

      <h4 class="mainLabel">Join a collaborative room</h4>

      <div class="inputGroup">
        <input id="roomIdInput" class="inputBox" placeholder="Room ID" />
        <input id="usernameInput" class="inputBox" placeholder="Username" />

        <button id="joinBtn" class="btn joinBtn">
          <span id="joinBtnText">Join</span>
        </button>

        <span class="createInfo">
          No invite? Create a
          <a id="createNewBtn" class="createNewBtn">new room</a>
        </span>
      </div>

    </div>
  </div>

  <!-- ================= MAIN EDITOR ================= -->
  <div class="mainWrap" id="editorPage" style="display:none;">

    <!-- ================= SIDEBAR ================= -->
    <div class="asideWrap">

      <div class="asideInner">

        <!-- USERS -->
        <div>
          <div class="sectionHeader">
            <span class="sectionTitle">Collaborators</span>
          </div>
          <div id="clientsList" class="clientsList"></div>
        </div>

        <!-- FILES -->
        <div>
          <div class="sectionHeader">
            <span class="sectionTitle">Files</span>
            <button id="newFileBtn" class="iconBtn">+</button>
          </div>

          <div id="fileTabs" class="file-tabs"></div>
        </div>

      </div>

      <button id="leaveBtn" class="btn leaveBtn">Leave Room</button>

    </div>

    <!-- ================= EDITOR ================= -->
    <div class="editorWrap">

      <!-- TOP BAR -->
      <div class="topBar">

        <div class="langSelectRow">
          <select id="languageSelect">
            <option value="python3">Python</option>
            <option value="javascript">JavaScript</option>
            <option value="html">HTML</option>
            <option value="css">CSS</option>
          </select>
        </div>

        <div class="topBar-actions">
          <button id="saveBtn" class="btn primaryBtn">Save</button>
          <button id="saveServerBtn" class="btn ghostBtn">Save to Server</button>
          <button id="deleteFileBtn" class="btn ghostBtn dangerGhost">Delete</button>
          <button id="runBtn" class="btn primaryBtn">
            <span id="runBtnText">Run</span>
          </button>
        </div>

      </div>

      <!-- EDITOR -->
      <div id="editorContainer" class="editorContainer"></div>

      <!-- OUTPUT PANEL -->
      <div class="panelWrap">

        <div class="panelHeader">
          <div class="panelTabs">
            <button class="panelTab active">Output</button>
          </div>
        </div>

        <div class="panelContent">
          <textarea id="outputArea" class="outputArea" readonly></textarea>
        </div>

      </div>

    </div>

    <!-- ================= CHAT ================= -->
    <div class="chatWrap">

      <div class="chatHeader">
        <span class="sectionTitle">Chat</span>
      </div>

      <div id="chatArea" class="chatArea"></div>

      <div class="sendChatWrap">
        <input id="chatInput" class="inputBox chatInput" placeholder="Type message..." />
        <button id="sendBtn" class="btn sendBtn primaryBtn">Send</button>
      </div>

    </div>

  </div>

  <!-- ================= SCRIPTS ================= -->

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/nanoid/nanoid.js"></script>

  <script type="module" src="js/main.js"></script>

</body>

</html>
